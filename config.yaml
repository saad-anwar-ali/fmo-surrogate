# ============================================================
# FMO Surrogate Model — GPU Configuration (v4)
# ============================================================
# Optimised for GPU training (RTX 4090/5090):
#   - batch_size: 32 → 256        (fills GPU VRAM, ~8x throughput)
#   - model sizes: scaled up      (GPU can handle larger networks)
#   - Lindblad sweep: 12,672 trajs (was 1,792)
#   - HEOM sweep: 960 trajs        (was 270)
#   - t_end extended to 5000 fs   (physically correct for ENAQT)
#   - n_steps: 200 → 500          (finer time resolution at 5ps)
#   - num_workers: 4              (DataLoader parallelism on GPU machine)
# ============================================================

seed: 42

# ---- Physical constants -------------------------------------
physics:
  k_B_cm_per_K: 0.6950356
  hbar_cm_fs: 5308.837

  site_energies_cm: [12410, 12530, 12210, 12320, 12480, 12630, 12440]
  couplings_cm:
    - [0, 1, -87.7]
    - [0, 2,   5.5]
    - [0, 3,  -5.9]
    - [0, 4,   6.7]
    - [0, 5, -13.7]
    - [0, 6,  -9.9]
    - [1, 2,  30.8]
    - [1, 3,   8.2]
    - [1, 4,   0.7]
    - [1, 5,  11.8]
    - [1, 6,   4.3]
    - [2, 3, -53.5]
    - [2, 4,  -2.2]
    - [2, 5,  -9.6]
    - [2, 6,   6.0]
    - [3, 4, -70.7]
    - [3, 5, -17.0]
    - [3, 6, -63.3]
    - [4, 5,  81.1]
    - [4, 6,  -1.3]
    - [5, 6,  39.7]

  Gamma1_cm: 3.14e-7
  k_sink_cm: 5.3
  heom_Nk: 3              # increased from 2 — better Matsubara convergence
  heom_max_depth: 3       # increased from 2 — more accurate hierarchy

# ---- Data generation sweep ----------------------------------
# Lindblad: 12×11×8×6×2 = 12,672 trajectories
# Denser grid covers parameter space 7x better than 1,792-traj version.
# t_end extended to 5000 fs (5 ps) — physically correct for ENAQT landscape.
# n_steps increased to 500 for finer time resolution (Δt = 10 fs).
sweep:
  T_K:          [77, 100, 130, 150, 180, 200, 230, 250, 270, 277, 290, 300]
  lambda_cm:    [5, 10, 20, 30, 40, 55, 70, 80, 90, 100, 120]
  omega_c_cm:   [30, 50, 75, 100, 130, 150, 180, 200]
  alpha_scale:  [0.25, 0.5, 0.75, 1.0, 1.5, 2.0]
  initial_sites: [0, 5]

  t_start_fs: 0.0
  t_end_fs: 5000.0        # 5 ps — captures full transfer dynamics
  n_steps: 500            # Δt = 10 fs — fine enough for coherent oscillations

  # HEOM: 6×5×4×4×2 = 960 trajectories (was 270)
  # Extended t_end to match Lindblad for direct comparison.
  heom_T_K:        [77, 150, 200, 250, 277, 300]
  heom_lambda_cm:  [10, 30, 55, 80, 100]
  heom_omega_c_cm: [50, 100, 150, 200]
  heom_alpha_scale: [0.5, 1.0, 1.5, 2.0]
  heom_t_end_fs: 1000.0   # 1 ps — HEOM is expensive, 1ps captures memory effects
  heom_n_steps: 200

# ---- HDF5 output paths --------------------------------------
data:
  lindblad_hdf5: "data/fmo_7site_lindblad.h5"
  heom_hdf5:     "data/fmo_7site_heom.h5"

# ---- Train/val/test split -----------------------------------
split:
  train_frac: 0.70
  val_frac:   0.15
  test_frac:  0.15

# ---- ML model hyperparameters — scaled up for GPU -----------
model:
  n_params: 5
  n_rho_elements: 98

  lstm:
    hidden_size: 768       # was 512 — larger hidden state for richer dynamics
    num_layers: 4          # was 3
    dropout: 0.15          # slightly higher for larger model

  pinn:
    hidden_sizes: [1024, 1024, 512, 512, 256]   # was [512,512,512,512]
    activation: "tanh"
    dropout: 0.0

  inverse:
    encoder_hidden: 512    # was 256
    encoder_layers: 4      # was 3
    encoder_out: 128       # was 64 — richer context for 5 params
    flow_hidden: 256       # was 128
    flow_layers: 8         # was 6
    flow_dropout: 0.05

  uncertainty:
    n_bootstrap: 20
    mc_dropout_samples: 50
    dropout_rate: 0.15

# ---- Training — GPU-optimised -------------------------------
training:
  batch_size: 256          # was 32 — fills GPU VRAM, ~8x throughput
  max_epochs: 500          # was 300 — more epochs since each is fast on GPU
  learning_rate: 3.0e-4   # slightly lower LR for larger batch (linear scaling rule)
  weight_decay: 1.0e-5
  num_workers: 4           # DataLoader parallel workers (GPU machines have many CPUs)
  pin_memory: true         # faster CPU→GPU transfers

  lr_scheduler:
    factor: 0.5
    patience: 20           # was 15 — more patience with larger dataset
    min_lr: 1.0e-7

  early_stopping_patience: 80   # was 50 — more room to find minimum

  # PINN physics weights (tuned for expanded dataset)
  lambda_trace: 0.1
  lambda_pos:   0.05
  lambda_herm:  0.02
  lambda_warmup_epochs: 30      # was 20 — more warmup for deeper PINN

  checkpoint_dir: "results/checkpoints"
  log_dir:        "results/logs"

# ---- Evaluation ---------------------------------------------
evaluation:
  n_trajectory_plots: 10         # was 5 — show more examples
  n_worst_trajectories: 20       # was 10
  enaqt_grid_size: 50            # was 30 — finer ENAQT grid
  figure_dpi: 200                # was 150 — publication quality
  figure_dir: "results/figures"
  benchmark_file: "results/benchmarks.json"
